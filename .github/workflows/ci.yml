name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install jj
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=v0.41.0
          mkdir -p "$HOME/.local/bin"
          gh release download "$tag" --repo jj-vcs/jj \
            --pattern "jj-${tag}-x86_64-unknown-linux-musl.tar.gz" \
            --output - | tar xz -C "$HOME/.local/bin" ./jj
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: bun install --frozen-lockfile
      - run: bun run test
